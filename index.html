<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root { --bg:#f6f8fc; --ink:#0f172a; --muted:#64748b; --line:rgba(148,163,184,.22); }
    body { margin:0; font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--ink); }
    .shell{min-height:100vh;display:flex}.sidebar{width:252px;background:white;border-right:1px solid var(--line);padding:22px 18px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:22px}.brand{display:flex;align-items:center;gap:12px;padding:12px 8px 18px}.brand-icon{width:44px;height:44px;border-radius:15px;background:linear-gradient(135deg,#7c3aed,#38bdf8);display:grid;place-items:center;color:white;font-weight:900;font-size:20px}.brand-title{font-size:20px;font-weight:900;line-height:1.05}.brand-subtitle{font-size:12px;color:var(--muted);margin-top:3px}.nav{display:grid;gap:8px}.tab{border-radius:14px;padding:13px 14px;color:#334155;cursor:pointer;transition:.2s;font-weight:700;display:flex;align-items:center;gap:10px;font-size:14px}.tab:hover{background:#f1f5f9}.tab.active{background:#f3e8ff;color:#6d28d9}.sidebar-footer{margin-top:auto;background:linear-gradient(180deg,#fff7ed,#f3e8ff);border-radius:24px;padding:18px;color:#334155;font-size:12px}.main{flex:1;padding:22px 26px 36px;min-width:0}.topbar{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;margin-bottom:18px}.page-title{font-size:32px;font-weight:900;letter-spacing:-.03em}.page-caption{color:var(--muted);margin-top:4px;font-size:14px}.filters{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:10px}.chip{min-width:150px;border:1px solid var(--line);border-radius:14px;padding:9px 12px;background:white;box-shadow:0 6px 18px rgba(15,23,42,.04);font-size:12px;color:var(--muted)}.chip select{width:100%;margin-top:4px;outline:none;background:transparent;font-weight:800;color:var(--ink);cursor:pointer}.export-btn{border:0;border-radius:14px;padding:14px 18px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;font-weight:900;cursor:pointer;box-shadow:0 10px 25px rgba(124,58,237,.28)}.card{background:white;border-radius:22px;padding:18px;box-shadow:0 10px 28px rgba(15,23,42,.055);border:1px solid var(--line);min-width:0}.kpi-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;margin-bottom:16px}.kpi{min-height:118px;display:flex;gap:14px;align-items:flex-start}.kpi-icon{width:48px;height:48px;border-radius:18px;display:grid;place-items:center;font-size:24px;flex:0 0 auto}.kpi-label{font-size:13px;color:#475569;font-weight:800}.kpi-value{margin-top:8px;font-size:30px;font-weight:950;letter-spacing:-.04em}.kpi-delta{margin-top:9px;font-size:12px;font-weight:900;display:inline-block;border-radius:999px;padding:4px 9px}.dashboard-grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:14px}.span-3{grid-column:span 3}.span-4{grid-column:span 4}.span-5{grid-column:span 5}.span-6{grid-column:span 6}.span-7{grid-column:span 7}.span-8{grid-column:span 8}.span-12{grid-column:span 12}.card-title-row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:10px}.card-title{font-size:16px;font-weight:900;letter-spacing:-.02em}.card-subtitle{color:var(--muted);font-size:12px;margin-top:4px}.chart{height:286px}.chart-sm{height:242px}.chart-lg{height:340px}.metric-table{width:100%;border-collapse:collapse;font-size:12px}.metric-table th{text-align:left;color:#64748b;font-weight:900;background:#f8fafc;padding:10px}.metric-table td{border-top:1px solid #eef2f7;padding:10px;font-weight:700;vertical-align:top}.insights{display:grid;gap:10px}.insight{display:grid;grid-template-columns:26px 1fr;gap:10px;align-items:start;padding:11px 12px;background:#faf5ff;border-radius:16px;color:#4c1d95;font-size:13px}.check{width:26px;height:26px;border-radius:999px;display:grid;place-items:center;background:white;color:#7c3aed;font-weight:900}.linklike{color:#6d28d9;font-weight:900;cursor:pointer}.linklike:hover{text-decoration:underline}.badge{display:inline-block;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900}.muted{color:var(--muted)}.formula{background:#f8fafc;border:1px dashed #cbd5e1;border-radius:16px;padding:12px;font-size:12px;color:#334155;line-height:1.5}.detail-panel{margin-top:14px;overflow:auto;max-height:520px;border:1px solid #eef2f7;border-radius:16px}.mini-card{border-radius:18px;background:#f8fafc;padding:14px}.mini-card .num{font-size:28px;font-weight:950;margin-top:4px}.click-card{cursor:pointer}.click-card:hover{outline:2px solid #ddd6fe}
    @media(max-width:1280px){.kpi-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.span-3,.span-4,.span-5,.span-6,.span-7,.span-8{grid-column:span 12}.topbar{grid-template-columns:1fr}.filters{justify-content:flex-start}}@media(max-width:900px){.sidebar{display:none}.main{padding:16px}.kpi-grid{grid-template-columns:1fr}.page-title{font-size:26px}}
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar"><div class="brand"><div class="brand-icon">HR</div><div><div class="brand-title">HR ДАШБОРД</div><div class="brand-subtitle">Аналитика по персоналу</div></div></div><div class="nav" id="tabs"></div><div class="sidebar-footer"><div style="font-weight:900;margin-bottom:8px;">Данные обновлены</div><div id="periodLabel">Загрузка...</div><div style="margin-top:18px;opacity:.85;">Источник: Excel → JSON</div></div></aside>
  <main class="main"><section class="topbar"><div><div class="page-title" id="pageTitle">Обзор</div><div class="page-caption" id="pageCaption">Ключевые показатели HR-функции и динамика компании</div></div><div class="filters"><label class="chip">Период<select id="yearFilter"></select></label><label class="chip">Сравнить с<select id="compareFilter"></select></label><label class="chip">Департамент<select id="departmentFilter"><option>Все</option></select></label><label class="chip">Тип занятости<select id="employmentFilter"><option>Штатные</option><option>Все</option><option>Аутсорсинг / неполная занятость</option></select></label><button class="export-btn" onclick="alert('Экспорт добавим следующим этапом')">⬇ Экспорт</button></div></section><section id="statusMessage" class="card"><div style="font-weight:900;">Загружаю данные...</div><div class="muted" style="margin-top:6px;font-size:13px;">Проверяю файлы в папке /data.</div></section><section id="kpiGrid" class="kpi-grid"></section><section id="content"></section></main>
</div>
<script>
const tabs=[{id:'Обзор',icon:'⌂',caption:'Ключевые показатели HR-функции и динамика компании'},{id:'Структура и менеджеры',icon:'♙',caption:'Руководители, команды, нагрузка и управленческий риск'},{id:'Текучесть и удержание',icon:'↻',caption:'Динамика увольнений, текучесть и удержание'},{id:'Состав команды',icon:'☷',caption:'Демография, стаж и профиль сотрудников'},{id:'География',icon:'◎',caption:'Распределение сотрудников по странам и городам'},{id:'Найм и увольнения',icon:'＋',caption:'Входящий и исходящий поток сотрудников'},{id:'Отчёты',icon:'□',caption:'Качество данных, экспорт и служебные отчёты'}];
let activeTab='Обзор', charts=[], detailMode='hires';
let data={monthly:[],departments:[],employees:[],events:[],locations:[],issues:[],summary:{}};
const monthNames=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const nonCoreAliases=['contractor','outsourcer','consultant','part_time','contractor_or_part_time','аутсорсинг','неполная занятость'];

async function loadJson(path){const r=await fetch(path,{cache:'no-store'});if(!r.ok)throw new Error(`Не найден файл: ${path}`);return await r.json()}
async function tryLoadJson(paths,fallback){for(const p of paths){try{return await loadJson(p)}catch(e){}}return fallback}
async function loadData(){try{data.monthly=await loadJson('data/monthly_snapshots.json');data.departments=await loadJson('data/department_snapshots.json');data.employees=await loadJson('data/employees.json');data.events=await loadJson('data/employee_events.json');data.locations=await tryLoadJson(['data/location_snapshots.json','data/locations_snapshots.json'],[]);data.issues=await tryLoadJson(['data/data_quality_issues.json'],[]);data.summary=await tryLoadJson(['data/etl_summary.json'],{});document.getElementById('statusMessage').style.display='none';initializeFilters();render()}catch(error){document.getElementById('statusMessage').innerHTML=`<div style="color:#b91c1c;font-weight:950;">Не удалось загрузить JSON-данные</div><div style="margin-top:8px;color:#dc2626;font-size:13px;">${error.message}</div><div class="muted" style="margin-top:14px;font-size:13px;">Проверь, что файлы лежат прямо в папке <b>data/</b>.</div>`}}

function num(v){return Number(v||0)}
function clean(v){return(v===undefined||v===null||v==='❌')?'':String(v).trim()}
function unique(arr){return[...new Set(arr.filter(Boolean))]}
function parseDate(v){v=clean(v);if(!v)return null;if(/^\d{4}-\d{2}-\d{2}/.test(v))return new Date(v.slice(0,10)+'T00:00:00');if(/^\d{1,2}\.\d{1,2}\.\d{4}$/.test(v)){const parts=v.split('.');return new Date(`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}T00:00:00`)}if(/^\d+(\.\d+)?$/.test(v)){const d=new Date(Date.UTC(1899,11,30)+Number(v)*86400000);return new Date(d.toISOString().slice(0,10)+'T00:00:00')}const d=new Date(v);return isNaN(d)?null:d}
function isoYear(v){const d=parseDate(v);return d?d.getFullYear():null}
function years(){return unique(data.monthly.map(x=>Number(x.year)).filter(Boolean)).sort((a,b)=>b-a)}
function selectedYear(){return Number(String(document.getElementById('yearFilter').value).slice(0,4))}
function compareYear(){return Number(String(document.getElementById('compareFilter').value).slice(0,4))}
function selectedDepartment(){return document.getElementById('departmentFilter').value}
function selectedEmployment(){return document.getElementById('employmentFilter').value}
function getDepartmentName(o){return clean(o.department_name||o.current_department_name||o.department||o.departmentName||o['Департамент'])}
function getManagerName(o){return clean(o.current_manager_name||o.manager_name||o.manager||o['Вышестоящий руководитель'])}
function getEmployeeType(o){return clean(o.employment_type||o.employee_type||o.employee_type_raw||o.status_raw||o['Тип сотрудника'])}
function getStatus(o){return clean(o.status||o.status_normalized||o['Статус']).toLowerCase()}
function getHireDate(o){return clean(o.hire_date||o['Первый рабочий день'])}
function getTerminationDate(o){return clean(o.termination_date||o['Последний рабочий день'])}
function getBirthDate(o){return clean(o.birth_date||o['День рождения'])}
function getName(o){return clean(o.full_name||o.display_name||o.name||o['ФИО сотрудника'])}
function getPosition(o){return clean(o.current_position_title||o.position_title||o.position||o['Должность'])}
function isRealEmployee(o){return o.is_real_employee===true||o.is_real_employee==='true'||o.is_real_employee==='Да'||o.is_real_employee===1}
function isExcluded(o){return o.exclude_from_core_metrics===true||o.exclude_from_core_metrics==='true'}
function isActiveOnEmployee(o){const s=getStatus(o);return s==='active'||s==='on_leave'||s==='работает'||s==='в декрете'}
function dateInYear(dateStr,year){return isoYear(dateStr)===Number(year)}
function isBadExitMonth(year,month){return Number(year)===2026&&(Number(month)===9||Number(month)===12)}

function matchesEmployment(o){const f=selectedEmployment();if(f==='Все')return!isExcluded(o);const h=`${getEmployeeType(o)} ${getStatus(o)}`.toLowerCase();const non=nonCoreAliases.some(x=>h.includes(x));if(f==='Аутсорсинг / неполная занятость')return!isExcluded(o)&&non;return!isExcluded(o)&&isRealEmployee(o)&&!non}
function employeePassesFilters(emp){const dep=selectedDepartment();if(dep!=='Все'&&getDepartmentName(emp)!==dep)return false;return matchesEmployment(emp)}
function activeEmployeesForYearEnd(year){const end=new Date(`${year}-12-31T23:59:59`);return data.employees.filter(emp=>{if(!employeePassesFilters(emp))return false;const hire=parseDate(getHireDate(emp));const term=parseDate(getTerminationDate(emp));if(hire&&hire>end)return false;if(term&&term<=end)return false;return isActiveOnEmployee(emp)||!term})}
function hiredEmployees(year){return data.employees.filter(e=>employeePassesFilters(e)&&dateInYear(getHireDate(e),year))}
function exitedEmployees(year){return data.employees.filter(e=>employeePassesFilters(e)&&dateInYear(getTerminationDate(e),year)&&!isBadExitMonth(year,(parseDate(getTerminationDate(e))?.getMonth()+1)))}
function averageTenureActive(year){const end=new Date(`${year}-12-31T00:00:00`);const vals=activeEmployeesForYearEnd(year).map(e=>{const h=parseDate(getHireDate(e));return h?(end-h)/86400000:null}).filter(v=>v!==null&&v>=0);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length/365:0}
function averageTenureExited(year){const vals=exitedEmployees(year).map(e=>{const h=parseDate(getHireDate(e)),t=parseDate(getTerminationDate(e));return h&&t?(t-h)/86400000:null}).filter(v=>v!==null&&v>=0);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length/365:0}

function initializeFilters(){const ys=years();document.getElementById('yearFilter').innerHTML=ys.map(y=>`<option>${y} (YTD)</option>`).join('');document.getElementById('compareFilter').innerHTML=ys.filter(y=>y!==ys[0]).map(y=>`<option>${y} (YTD)</option>`).join('')||ys.map(y=>`<option>${y} (YTD)</option>`).join('');const deps=unique([...data.departments.map(getDepartmentName),...data.employees.map(getDepartmentName)]).sort();document.getElementById('departmentFilter').innerHTML=['Все',...deps].map(d=>`<option>${d}</option>`).join('');document.getElementById('periodLabel').textContent=`${Math.min(...ys)}–${Math.max(...ys)} · реальные JSON`}
function disposeCharts(){charts.forEach(c=>{try{c.dispose()}catch(e){}});charts=[]}
function makeChart(id,opt){const el=document.getElementById(id);if(!el)return;const c=echarts.init(el);c.setOption(opt);charts.push(c)}
function pct(cur,prev){if(!prev)return'0.0';return(((cur-prev)/prev)*100).toFixed(1)}
function calcTurnover(exits,avgHeadcount){return avgHeadcount?exits/avgHeadcount*100:0}

function renderTabs(){document.getElementById('tabs').innerHTML=tabs.map(t=>`<div class="tab ${t.id===activeTab?'active':''}" onclick="setTab('${t.id}')"><span>${t.icon}</span><span>${t.id}</span></div>`).join('')}
function setTab(tab){activeTab=tab;render()}

function monthRows(year){const dep=selectedDepartment();let rows;if(dep==='Все'){rows=data.monthly.filter(x=>Number(x.year)===Number(year)).sort((a,b)=>Number(a.month)-Number(b.month)).map(x=>({...x}))}else{rows=data.departments.filter(x=>Number(x.year)===Number(year)&&getDepartmentName(x)===dep).sort((a,b)=>Number(a.month)-Number(b.month)).map(r=>({year:r.year,month:r.month,active_headcount_start:num(r.headcount_start||r.active_headcount_start),active_headcount_end:num(r.headcount_end||r.active_headcount_end),hires:num(r.hires),exits:num(r.exits),turnover_rate_pct:num(r.turnover_rate_pct),avg_tenure_days:num(r.avg_tenure_days)}))}return rows.map(r=>{if(isBadExitMonth(year,r.month)){r.exits=0;r.turnover_rate_pct=0}const avg=num(r.avg_headcount)||((num(r.active_headcount_start||r.headcount_start)+num(r.active_headcount_end||r.headcount_end))/2)||num(r.active_headcount_end||r.headcount_end);if(!num(r.turnover_rate_pct)&&num(r.exits))r.turnover_rate_pct=calcTurnover(num(r.exits),avg);return r})}
function yearSummary(year){const rows=monthRows(year);if(!rows.length)return{hc:0,hires:0,exits:0,turnover:0,tenure:0,span:0,exitTenure:0};const last=rows[rows.length-1];const hires=hiredEmployees(year).length||rows.reduce((s,x)=>s+num(x.hires),0);const exits=exitedEmployees(year).length||rows.reduce((s,x)=>s+num(x.exits),0);const avgHead=rows.reduce((s,x)=>s+(num(x.avg_headcount)||((num(x.active_headcount_start||x.headcount_start)+num(x.active_headcount_end||x.headcount_end))/2)||num(x.active_headcount_end||x.headcount_end)),0)/rows.length;const turnover=calcTurnover(exits,avgHead);const mgr=managerRows(year);const span=mgr.length?mgr.reduce((s,x)=>s+x.reports,0)/mgr.length:0;return{hc:num(last.active_headcount_end||last.headcount_end),hires,exits,turnover,tenure:averageTenureActive(year),span,exitTenure:averageTenureExited(year)}}
function departmentRowsByYear(year,limit=12){const selected=selectedDepartment();return data.departments.filter(x=>Number(x.year)===Number(year)&&Number(x.month)===12&&(selected==='Все'||getDepartmentName(x)===selected)).map(d=>{let exits=num(d.exits);if(isBadExitMonth(year,12))exits=0;const avg=num(d.avg_headcount)||((num(d.headcount_start||d.active_headcount_start)+num(d.headcount_end||d.active_headcount_end))/2)||num(d.headcount_end||d.active_headcount_end);return{name:getDepartmentName(d),value:num(d.headcount_end||d.active_headcount_end),turnover:calcTurnover(exits,avg),hires:num(d.hires),exits}}).filter(x=>x.name&&(x.value>0||x.turnover>0||x.hires>0||x.exits>0)).sort((a,b)=>b.value-a.value).slice(0,limit)}
function managerRows(year){const employees=activeEmployeesForYearEnd(year),by={};employees.forEach(emp=>{const m=getManagerName(emp);if(!m)return;if(!by[m])by[m]={name:m,reports:0,departments:{},exits:0};by[m].reports++;const d=getDepartmentName(emp)||'Не указан';by[m].departments[d]=(by[m].departments[d]||0)+1});exitedEmployees(year).forEach(emp=>{const m=getManagerName(emp);if(m&&by[m])by[m].exits++});return Object.values(by).map(m=>{const dept=Object.entries(m.departments).sort((a,b)=>b[1]-a[1])[0]?.[0]||'Не указан';const turnover=m.reports?(m.exits/m.reports)*100:0;const risk=m.reports>=15||turnover>=8?'Высокий':(m.reports>=10||turnover>=4?'Средний':'Низкий');return{...m,dept,turnover,risk}}).sort((a,b)=>b.reports-a.reports)}
function riskBadge(r){const c={'Высокий':'background:#FEF2F2;color:#B91C1C','Средний':'background:#FFFBEB;color:#B45309','Низкий':'background:#ECFDF5;color:#047857'};return`<span class="badge" style="${c[r]||c['Средний']}">${r}</span>`}

function activeAgeBands(year){const end=new Date(`${year}-12-31T00:00:00`),bands={'< 25 лет':0,'25–34 года':0,'35–44 года':0,'45–54 года':0,'55+ лет':0,'Не указано':0};activeEmployeesForYearEnd(year).forEach(emp=>{const bd=parseDate(getBirthDate(emp));if(!bd){bands['Не указано']++;return}const age=Math.floor((end-bd)/(365.25*86400000));if(age<25)bands['< 25 лет']++;else if(age<35)bands['25–34 года']++;else if(age<45)bands['35–44 года']++;else if(age<55)bands['45–54 года']++;else bands['55+ лет']++});return Object.entries(bands).map(([name,value])=>({name,value})).filter(x=>x.value>0)}
function tenureBands(year){const end=new Date(`${year}-12-31T00:00:00`),bands={'<3 мес':0,'3–6 мес':0,'6–12 мес':0,'1–2 года':0,'2–5 лет':0,'5+ лет':0};activeEmployeesForYearEnd(year).forEach(emp=>{const h=parseDate(getHireDate(emp));if(!h)return;const days=(end-h)/86400000;if(days<90)bands['<3 мес']++;else if(days<180)bands['3–6 мес']++;else if(days<365)bands['6–12 мес']++;else if(days<730)bands['1–2 года']++;else if(days<1825)bands['2–5 лет']++;else bands['5+ лет']++});return Object.entries(bands).map(([name,value])=>({name,value}))}
function newHireAgeByDriver(year){const end=new Date(`${year}-12-31T00:00:00`),groups={'Водители':{'< 25 лет':0,'25–34 года':0,'35–44 года':0,'45+ лет':0,'Не указано':0},'Остальные':{'< 25 лет':0,'25–34 года':0,'35–44 года':0,'45+ лет':0,'Не указано':0}};hiredEmployees(year).forEach(emp=>{const g=getPosition(emp).toLowerCase().includes('водитель')?'Водители':'Остальные';const bd=parseDate(getBirthDate(emp));if(!bd){groups[g]['Не указано']++;return}const age=Math.floor((end-bd)/(365.25*86400000));if(age<25)groups[g]['< 25 лет']++;else if(age<35)groups[g]['25–34 года']++;else if(age<45)groups[g]['35–44 года']++;else groups[g]['45+ лет']++});return groups}

function countryRows(year){const agg={};activeEmployeesForYearEnd(year).forEach(e=>{const k=clean(e.country||'Не указано');agg[k]=(agg[k]||0)+1});return Object.entries(agg).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value)}
function cityRows(){const agg={};activeEmployeesForYearEnd(selectedYear()).forEach(e=>{const k=clean(e.city||e.country||'Не указано');agg[k]=(agg[k]||0)+1});return Object.entries(agg).map(([name,value])=>({name,value})).filter(x=>x.value>0).sort((a,b)=>b.value-a.value)}
function yoyRows(y,c){const a=yearSummary(y),b=yearSummary(c);return[['Численность',a.hc,b.hc,`${pct(a.hc,b.hc)}%`],['Найм',a.hires,b.hires,`${pct(a.hires,b.hires)}%`],['Увольнения',a.exits,b.exits,`${pct(a.exits,b.exits)}%`],['Текучесть (%)',a.turnover.toFixed(1),b.turnover.toFixed(1),`${(a.turnover-b.turnover).toFixed(1)} п.п.`],['Средний стаж (лет)',a.tenure.toFixed(1),b.tenure.toFixed(1),`${(a.tenure-b.tenure).toFixed(1)}`],['Средний стаж уволенных (лет)',a.exitTenure.toFixed(1),b.exitTenure.toFixed(1),`${(a.exitTenure-b.exitTenure).toFixed(1)}`]]}

function renderKpis(){const y=selectedYear(),c=compareYear(),a=yearSummary(y),b=yearSummary(c);const cards=[{icon:'👥',title:'Численность',value:a.hc,delta:`${pct(a.hc,b.hc)}% к ${c}`,bg:'#f3e8ff',text:'#7c3aed'},{icon:'➕',title:'Найм (YTD)',value:a.hires,delta:`${pct(a.hires,b.hires)}% к ${c}`,bg:'#dcfce7',text:'#16a34a'},{icon:'↪',title:'Увольнения (YTD)',value:a.exits,delta:`${pct(a.exits,b.exits)}% к ${c}`,bg:'#ffe4e6',text:'#e11d48'},{icon:'%',title:'Текучесть (YTD)',value:`${a.turnover.toFixed(1)}%`,delta:`${(a.turnover-b.turnover).toFixed(1)} п.п. к ${c}`,bg:'#fef3c7',text:'#d97706'},{icon:'⏱',title:'Средний стаж',value:`${a.tenure.toFixed(1)} г`,delta:`уволенные: ${a.exitTenure.toFixed(1)} г`,bg:'#dbeafe',text:'#2563eb'}];document.getElementById('kpiGrid').innerHTML=cards.map(card=>`<div class="card kpi"><div class="kpi-icon" style="background:${card.bg};color:${card.text};">${card.icon}</div><div><div class="kpi-label">${card.title}</div><div class="kpi-value">${card.value}</div><div class="kpi-delta" style="background:${card.bg};color:${card.text};">${card.delta}</div></div></div>`).join('')}
function formulaBlock(){return`<div class="formula"><b>Формула текучести:</b><br/>Текучесть за период = Количество увольнений за период / Средняя численность за период × 100%.<br/>Средняя численность = среднее месячных headcount внутри выбранного года. Увольнения в сентябре и декабре 2026 исключены как ошибки базы.</div>`}

function overview(){const y=selectedYear(),c=compareYear(),rows=yoyRows(y,c),a=yearSummary(y);return`<div class="dashboard-grid"><div class="card span-4"><div class="card-title-row"><div><div class="card-title">Динамика численности</div><div class="card-subtitle">Сравнение ${y} и ${c}</div></div></div><div id="growthChart" class="chart"></div></div><div class="card span-4"><div class="card-title-row"><div><div class="card-title">Найм и увольнения</div><div class="card-subtitle">Ошибочные увольнения 09/2026 и 12/2026 исключены</div></div></div><div id="hireExitChart" class="chart"></div></div><div class="card span-4"><div class="card-title-row"><div><div class="card-title">Текучесть по месяцам (%)</div><div class="card-subtitle">Расчёт по формуле ниже</div></div></div><div id="turnoverTrendChart" class="chart"></div></div><div class="card span-3"><div class="card-title">Численность по департаментам</div><div class="card-subtitle">Доля и количество</div><div id="deptTreemap" class="chart-sm"></div></div><div class="card span-3"><div class="card-title">Текучесть по департаментам (%)</div><div class="card-subtitle">Названия вынесены полностью</div><div id="deptTurnoverChart" class="chart-sm"></div></div><div class="card span-3"><div class="card-title">Возрастная структура</div><div class="card-subtitle">Возраст рассчитан по дате рождения</div><div id="ageChart" class="chart-sm"></div></div><div class="card span-3"><div class="card-title">Сравнение метрик</div><div class="card-subtitle">${y} vs ${c}</div><table class="metric-table" style="margin-top:10px"><thead><tr><th>Метрика</th><th>${y}</th><th>${c}</th><th>Δ</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('')}</tbody></table></div><div class="card span-6"><div class="card-title">Распределение по странам</div><div class="card-subtitle">Единая логика: активные сотрудники на конец года</div><div id="countryChart" class="chart-sm"></div></div><div class="card span-6"><div class="card-title">Методология</div><div class="card-subtitle">Как считаются основные метрики</div><div style="margin-top:12px">${formulaBlock()}</div><div class="insights" style="margin-top:12px"><div class="insight"><div class="check">✓</div><div>Средний стаж активных сотрудников: <b>${a.tenure.toFixed(1)} г</b>.</div></div><div class="insight"><div class="check">✓</div><div>Среднее время работы уволенных: <b>${a.exitTenure.toFixed(1)} г</b>.</div></div></div></div></div>`}
function managersView(){const y=selectedYear(),rows=managerRows(y);return`<div class="dashboard-grid"><div class="card span-8"><div class="card-title">Руководители и нагрузка</div><div class="card-subtitle">Фамилии руководителей, сотрудники, текучесть и риск</div><div class="detail-panel"><table class="metric-table"><thead><tr><th>Руководитель</th><th>Департамент</th><th>Сотрудники</th><th>Текучесть</th><th>Риск</th></tr></thead><tbody>${rows.map(m=>`<tr><td><span class="linklike" onclick="alert('Следующий этап: карточка руководителя ${m.name}')">${m.name}</span></td><td>${m.dept}</td><td>${m.reports}</td><td>${m.turnover.toFixed(1)}%</td><td>${riskBadge(m.risk)}</td></tr>`).join('')}</tbody></table></div></div><div class="card span-4"><div class="card-title">Охват руководителя</div><div class="card-subtitle">Топ-15 по числу сотрудников</div><div id="spanChart" class="chart-lg"></div></div><div class="card span-6"><div class="card-title">Риск по руководителям</div><div id="managerRiskChart" class="chart-sm"></div></div><div class="card span-6"><div class="card-title">Управленческий комментарий</div><div class="insights" style="margin-top:12px"><div class="insight"><div class="check">✓</div><div>Высокий риск считается при охвате 15+ или повышенной текучести.</div></div></div></div></div>`}
function attritionView(){return`<div class="dashboard-grid"><div class="card span-7"><div class="card-title">Динамика текучести</div><div class="card-subtitle">По месяцам с учётом фильтров</div><div id="attritionTrend" class="chart-lg"></div></div><div class="card span-5"><div class="card-title">Увольнения по месяцам</div><div class="card-subtitle">Сентябрь и декабрь 2026 исключены</div><div id="exitsChart" class="chart-lg"></div></div><div class="card span-6"><div class="card-title">Найм и увольнения</div><div id="flowChart" class="chart-sm"></div></div><div class="card span-6"><div class="card-title">Текучесть по департаментам</div><div class="card-subtitle">Подписи департаментов отображаются полностью</div><div id="attritionDeptChart" class="chart-sm"></div></div><div class="card span-12">${formulaBlock()}</div></div>`}
function workforceView(){return`<div class="dashboard-grid"><div class="card span-4"><div class="card-title">Гендерное распределение</div><div id="genderChart" class="chart-sm"></div></div><div class="card span-4"><div class="card-title">Распределение по стажу</div><div id="tenureChart" class="chart-sm"></div></div><div class="card span-4"><div class="card-title">Возрастная структура</div><div class="card-subtitle">Возраст рассчитан из дат рождения</div><div id="ageChart2" class="chart-sm"></div></div><div class="card span-12"><div class="card-title">Возраст новых сотрудников: водители vs остальные</div><div class="card-subtitle">Новые сотрудники = первый рабочий день в выбранном году</div><div id="newHireAgeChart" class="chart-lg"></div></div></div>`}
function geographyView(){const cities=cityRows();return`<div class="dashboard-grid"><div class="card span-7"><div class="card-title">География по городам</div><div class="card-subtitle">Активные сотрудники на конец выбранного года</div><div id="cityChart" style="height:${Math.max(420,cities.length*28)}px"></div></div><div class="card span-5"><div class="card-title">Распределение по странам</div><div id="countryChart2" class="chart-lg"></div></div></div>`}
function flowDetailTable(){const y=selectedYear();const list=detailMode==='hires'?hiredEmployees(y):exitedEmployees(y);const title=detailMode==='hires'?'Нанятые сотрудники':'Уволенные сотрудники';return`<div class="detail-panel"><table class="metric-table"><thead><tr><th colspan="4">${title}: ${list.length}</th></tr><tr><th>ФИО</th><th>Должность</th><th>Подразделение</th><th>Руководитель</th></tr></thead><tbody>${list.map(e=>`<tr><td>${getName(e)}</td><td>${getPosition(e)}</td><td>${getDepartmentName(e)}</td><td>${getManagerName(e)}</td></tr>`).join('')}</tbody></table></div>`}
function flowView(){const y=selectedYear(),a=yearSummary(y);return`<div class="dashboard-grid"><div class="card span-8"><div class="card-title">Найм и увольнения по месяцам</div><div id="flowChart2" class="chart-lg"></div></div><div class="card span-4"><div class="card-title">Сводка YTD</div><div class="card-subtitle">Кликните на цифру, чтобы открыть список</div><div style="display:grid;gap:12px;margin-top:14px"><div class="mini-card click-card" onclick="detailMode='hires';render()"><div class="muted">Нанятые</div><div class="num">${a.hires}</div></div><div class="mini-card click-card" onclick="detailMode='exits';render()"><div class="muted">Уволенные</div><div class="num">${a.exits}</div></div></div></div><div class="card span-12"><div class="card-title">Список сотрудников</div>${flowDetailTable()}</div></div>`}
function reportsView(){return`<div class="dashboard-grid"><div class="card span-12"><div class="card-title">Качество данных</div><div class="card-subtitle">Первые 30 замечаний</div><div class="detail-panel"><table class="metric-table"><thead><tr><th>Severity</th><th>Поле</th><th>Описание</th></tr></thead><tbody>${data.issues.slice(0,30).map(i=>`<tr><td>${i.severity||''}</td><td>${i.field||''}</td><td>${i.message||i.issue_type||''}</td></tr>`).join('')}</tbody></table></div></div></div>`}

function renderContent(){const map={'Обзор':overview,'Структура и менеджеры':managersView,'Текучесть и удержание':attritionView,'Состав команды':workforceView,'География':geographyView,'Найм и увольнения':flowView,'Отчёты':reportsView};document.getElementById('content').innerHTML=map[activeTab]()}
function renderHeader(){const t=tabs.find(x=>x.id===activeTab);document.getElementById('pageTitle').textContent=activeTab;document.getElementById('pageCaption').textContent=t?.caption||''}
function render(){renderHeader();renderTabs();renderKpis();renderContent();setTimeout(renderCharts,0)}

function renderCharts(){const y=selectedYear(),c=compareYear();disposeCharts();const mrY=monthRows(y),mrC=monthRows(c),dep=departmentRowsByYear(y,12),turn=departmentRowsByYear(y,25).sort((a,b)=>b.turnover-a.turnover).slice(0,10).reverse();
if(activeTab==='Обзор'){makeChart('growthChart',{color:['#7c3aed','#f59e0b'],tooltip:{trigger:'axis'},legend:{bottom:0},grid:{top:20,left:45,right:20,bottom:45},xAxis:{type:'category',data:monthNames},yAxis:{type:'value'},series:[{name:String(y),type:'line',smooth:true,data:mrY.map(x=>num(x.active_headcount_end)),lineStyle:{width:4}},{name:String(c),type:'line',smooth:true,data:mrC.map(x=>num(x.active_headcount_end)),lineStyle:{width:3}}]});makeChart('hireExitChart',{color:['#22c55e','#f43f5e'],tooltip:{trigger:'axis'},legend:{bottom:0},grid:{top:20,left:35,right:20,bottom:50},xAxis:{type:'category',data:monthNames},yAxis:{type:'value'},series:[{name:`Найм ${y}`,type:'bar',data:mrY.map(x=>num(x.hires))},{name:`Увольнения ${y}`,type:'bar',data:mrY.map(x=>num(x.exits))}]});makeChart('turnoverTrendChart',{color:['#7c3aed','#f59e0b'],tooltip:{trigger:'axis'},legend:{bottom:0},grid:{top:20,left:45,right:20,bottom:45},xAxis:{type:'category',data:monthNames},yAxis:{type:'value',axisLabel:{formatter:'{value}%'}},series:[{name:String(y),type:'line',smooth:true,data:mrY.map(x=>num(x.turnover_rate_pct).toFixed(1))},{name:String(c),type:'line',smooth:true,data:mrC.map(x=>num(x.turnover_rate_pct).toFixed(1))}]});const depTotal=dep.reduce((s,d)=>s+num(d.value),0);makeChart('deptTreemap',{tooltip:{formatter:i=>{const v=num(i.value),sh=depTotal?((v/depTotal)*100).toFixed(1):'0.0';return`${i.name}<br/>${v} сотрудников<br/>${sh}%`}},series:[{type:'treemap',roam:false,nodeClick:false,breadcrumb:{show:false},data:dep.map(d=>({name:d.name,value:d.value,label:{formatter:()=>{const sh=depTotal?((num(d.value)/depTotal)*100).toFixed(1):'0.0';return`${d.name}\n${d.value} (${sh}%)`}}})),label:{color:'#fff',fontWeight:800,fontSize:12},itemStyle:{borderColor:'#fff',borderWidth:2}}]});makeChart('deptTurnoverChart',{color:['#a855f7'],tooltip:{trigger:'axis'},grid:{left:185,right:15,top:20,bottom:35},xAxis:{type:'value',axisLabel:{formatter:'{value}%'}},yAxis:{type:'category',data:turn.map(d=>d.name),axisLabel:{interval:0,width:175,overflow:'break'}},series:[{name:String(y),type:'bar',data:turn.map(d=>num(d.turnover.toFixed(1)))}]});makeChart('ageChart',{color:['#7c3aed','#3b82f6','#22c55e','#f59e0b','#f43f5e','#94a3b8'],tooltip:{trigger:'item'},legend:{right:0,top:'middle',orient:'vertical'},series:[{type:'pie',radius:['48%','72%'],center:['38%','48%'],data:activeAgeBands(y)}]});makeChart('countryChart',{color:['#7c3aed','#3b82f6','#22c55e','#f59e0b','#f43f5e','#94a3b8'],tooltip:{trigger:'item'},legend:{right:0,top:'middle',orient:'vertical'},series:[{type:'pie',radius:['45%','70%'],center:['36%','48%'],data:countryRows(y)}]})}
if(activeTab==='Структура и менеджеры'){const rows=managerRows(y).slice(0,15).reverse(),risks={Высокий:0,Средний:0,Низкий:0};managerRows(y).forEach(m=>risks[m.risk]++);makeChart('spanChart',{color:['#7c3aed'],tooltip:{trigger:'axis'},grid:{left:135,right:20,top:20,bottom:30},xAxis:{type:'value'},yAxis:{type:'category',data:rows.map(r=>r.name)},series:[{name:'Сотрудники',type:'bar',data:rows.map(r=>r.reports),itemStyle:{borderRadius:[0,10,10,0]}}]});makeChart('managerRiskChart',{color:['#f43f5e','#f59e0b','#22c55e'],tooltip:{trigger:'item'},legend:{bottom:0},series:[{type:'pie',radius:['45%','70%'],data:Object.entries(risks).map(([name,value])=>({name,value}))}]})}
if(activeTab==='Текучесть и удержание'){makeChart('attritionTrend',{color:['#7c3aed','#f59e0b'],tooltip:{trigger:'axis'},legend:{bottom:0},grid:{top:25,left:45,right:20,bottom:45},xAxis:{type:'category',data:monthNames},yAxis:{type:'value',axisLabel:{formatter:'{value}%'}},series:[{name:String(y),type:'line',smooth:true,areaStyle:{opacity:.12},data:mrY.map(x=>num(x.turnover_rate_pct).toFixed(1))},{name:String(c),type:'line',smooth:true,data:mrC.map(x=>num(x.turnover_rate_pct).toFixed(1))}]});makeChart('exitsChart',{color:['#f43f5e'],tooltip:{trigger:'axis'},grid:{top:25,left:45,right:20,bottom:35},xAxis:{type:'category',data:monthNames},yAxis:{type:'value'},series:[{name:'Увольнения',type:'bar',data:mrY.map(x=>num(x.exits)),itemStyle:{borderRadius:[8,8,0,0]}}]});makeChart('flowChart',{color:['#22c55e','#f43f5e'],tooltip:{trigger:'axis'},legend:{bottom:0},grid:{top:20,left:45,right:20,bottom:45},xAxis:{type:'category',data:monthNames},yAxis:{type:'value'},series:[{name:'Найм',type:'bar',data:mrY.map(x=>num(x.hires))},{name:'Увольнения',type:'bar',data:mrY.map(x=>num(x.exits))}]});makeChart('attritionDeptChart',{color:['#f97316'],tooltip:{trigger:'axis'},grid:{left:185,right:20,top:20,bottom:35},xAxis:{type:'value'},yAxis:{type:'category',data:turn.map(d=>d.name),axisLabel:{interval:0,width:175,overflow:'break'}},series:[{name:'Текучесть %',type:'bar',data:turn.map(d=>num(d.turnover.toFixed(1))),itemStyle:{borderRadius:[0,10,10,0]}}]})}
if(activeTab==='Состав команды'){const active=activeEmployeesForYearEnd(y),male=active.filter(e=>['male','мужской'].includes(clean(e.gender).toLowerCase())).length,female=active.filter(e=>['female','женский'].includes(clean(e.gender).toLowerCase())).length,unknown=Math.max(active.length-male-female,0);makeChart('genderChart',{color:['#3b82f6','#ec4899','#94a3b8'],tooltip:{trigger:'item'},legend:{bottom:0},series:[{type:'pie',radius:['48%','72%'],data:[{name:'Мужчины',value:male},{name:'Женщины',value:female},{name:'Не указано',value:unknown}]}]});const tb=tenureBands(y);makeChart('tenureChart',{color:['#22c55e'],tooltip:{trigger:'axis'},grid:{left:45,right:20,top:25,bottom:45},xAxis:{type:'category',data:tb.map(x=>x.name)},yAxis:{type:'value'},series:[{name:'Сотрудники',type:'bar',data:tb.map(x=>x.value),itemStyle:{borderRadius:[8,8,0,0]}}]});makeChart('ageChart2',{color:['#7c3aed','#3b82f6','#22c55e','#f59e0b','#f43f5e','#94a3b8'],tooltip:{trigger:'item'},legend:{bottom:0},series:[{type:'pie',radius:['48%','72%'],data:activeAgeBands(y)}]});const nh=newHireAgeByDriver(y),cats=['< 25 лет','25–34 года','35–44 года','45+ лет','Не указано'];makeChart('newHireAgeChart',{color:['#7c3aed','#06b6d4'],tooltip:{trigger:'axis'},legend:{bottom:0},grid:{top:30,left:55,right:20,bottom:55},xAxis:{type:'category',data:cats},yAxis:{type:'value'},series:[{name:'Водители',type:'bar',stack:'new',data:cats.map(k=>nh['Водители'][k])},{name:'Остальные',type:'bar',stack:'new',data:cats.map(k=>nh['Остальные'][k])}]})}
if(activeTab==='География'){const cities=cityRows().slice().reverse();makeChart('cityChart',{color:['#06b6d4'],tooltip:{trigger:'axis'},grid:{left:135,right:20,top:20,bottom:35},xAxis:{type:'value'},yAxis:{type:'category',data:cities.map(x=>x.name)},series:[{name:'Сотрудники',type:'bar',data:cities.map(x=>x.value),itemStyle:{borderRadius:[0,10,10,0]}}]});makeChart('countryChart2',{color:['#7c3aed','#3b82f6','#22c55e','#f59e0b','#f43f5e','#94a3b8'],tooltip:{trigger:'item'},legend:{bottom:0},series:[{type:'pie',radius:['45%','70%'],data:countryRows(y)}]})}
if(activeTab==='Найм и увольнения'){makeChart('flowChart2',{color:['#22c55e','#f43f5e'],tooltip:{trigger:'axis'},legend:{bottom:0},grid:{top:25,left:45,right:20,bottom:45},xAxis:{type:'category',data:monthNames},yAxis:{type:'value'},series:[{name:'Найм',type:'bar',data:mrY.map(x=>num(x.hires))},{name:'Увольнения',type:'bar',data:mrY.map(x=>num(x.exits))}]})}}

document.getElementById('yearFilter').addEventListener('change',render);
document.getElementById('compareFilter').addEventListener('change',render);
document.getElementById('departmentFilter').addEventListener('change',render);
document.getElementById('employmentFilter').addEventListener('change',render);
window.addEventListener('resize',()=>charts.forEach(c=>c.resize()));
loadData();
</script>
</body>
</html>
