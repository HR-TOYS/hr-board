<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg: #f6f8fc;
      --ink: #0f172a;
      --muted: #64748b;
      --line: rgba(148, 163, 184, 0.22);
      --violet: #7c3aed;
      --blue: #3b82f6;
      --cyan: #06b6d4;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #f43f5e;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .shell { min-height: 100vh; display: flex; }

    .sidebar {
      width: 252px;
      background: white;
      border-right: 1px solid var(--line);
      padding: 22px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 8px 18px;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      border-radius: 15px;
      background: linear-gradient(135deg, #7c3aed, #38bdf8);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 900;
      font-size: 20px;
    }

    .brand-title { font-size: 20px; font-weight: 900; line-height: 1.05; }
    .brand-subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .nav { display: grid; gap: 8px; }
    .tab {
      border-radius: 14px;
      padding: 13px 14px;
      color: #334155;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }
    .tab:hover { background: #f1f5f9; }
    .tab.active { background: #f3e8ff; color: #6d28d9; }

    .sidebar-footer {
      margin-top: auto;
      background: linear-gradient(180deg, #fff7ed, #f3e8ff);
      border-radius: 24px;
      padding: 18px;
      color: #334155;
      font-size: 12px;
    }

    .main { flex: 1; padding: 22px 26px 36px; min-width: 0; }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      margin-bottom: 18px;
    }

    .page-title { font-size: 32px; font-weight: 900; letter-spacing: -0.03em; }
    .page-caption { color: var(--muted); margin-top: 4px; font-size: 14px; }

    .filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .chip {
      min-width: 150px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 9px 12px;
      background: white;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
      font-size: 12px;
      color: var(--muted);
    }

    .chip select {
      width: 100%;
      margin-top: 4px;
      outline: none;
      background: transparent;
      font-weight: 800;
      color: var(--ink);
      cursor: pointer;
    }

    .export-btn {
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(124, 58, 237, 0.28);
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.055);
      border: 1px solid var(--line);
      min-width: 0;
    }

    .kpi-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; margin-bottom: 16px; }
    .kpi { min-height: 118px; display: flex; gap: 14px; align-items: flex-start; }
    .kpi-icon { width: 48px; height: 48px; border-radius: 18px; display: grid; place-items: center; font-size: 24px; flex: 0 0 auto; }
    .kpi-label { font-size: 13px; color: #475569; font-weight: 800; }
    .kpi-value { margin-top: 8px; font-size: 30px; font-weight: 950; letter-spacing: -0.04em; }
    .kpi-delta { margin-top: 9px; font-size: 12px; font-weight: 900; display: inline-block; border-radius: 999px; padding: 4px 9px; }

    .dashboard-grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 14px; }
    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 4; }
    .span-5 { grid-column: span 5; }
    .span-6 { grid-column: span 6; }
    .span-7 { grid-column: span 7; }
    .span-8 { grid-column: span 8; }
    .span-12 { grid-column: span 12; }

    .card-title-row { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
    .card-title { font-size: 16px; font-weight: 900; letter-spacing: -0.02em; }
    .card-subtitle { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .mini-select { border: 1px solid var(--line); border-radius: 10px; padding: 7px 8px; background: white; color: #334155; font-size: 12px; }

    .chart { height: 286px; }
    .chart-sm { height: 242px; }
    .chart-lg { height: 340px; }

    .metric-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .metric-table th { text-align: left; color: #64748b; font-weight: 900; background: #f8fafc; padding: 10px; }
    .metric-table td { border-top: 1px solid #eef2f7; padding: 10px; font-weight: 700; }

    .insights { display: grid; gap: 10px; }
    .insight { display: grid; grid-template-columns: 26px 1fr; gap: 10px; align-items: start; padding: 11px 12px; background: #faf5ff; border-radius: 16px; color: #4c1d95; font-size: 13px; }
    .check { width: 26px; height: 26px; border-radius: 999px; display: grid; place-items: center; background: white; color: #7c3aed; font-weight: 900; }

    .linklike { color: #6d28d9; font-weight: 900; cursor: pointer; }
    .linklike:hover { text-decoration: underline; }
    .badge { display: inline-block; border-radius: 999px; padding: 5px 10px; font-size: 12px; font-weight: 900; }
    .muted { color: var(--muted); }

    #statusMessage { margin-top: 18px; }

    @media (max-width: 1280px) {
      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .span-3, .span-4, .span-5, .span-6, .span-7, .span-8 { grid-column: span 12; }
      .topbar { grid-template-columns: 1fr; }
      .filters { justify-content: flex-start; }
    }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { padding: 16px; }
      .kpi-grid { grid-template-columns: 1fr; }
      .page-title { font-size: 26px; }
    }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">HR</div>
      <div>
        <div class="brand-title">HR ДАШБОРД</div>
        <div class="brand-subtitle">Аналитика по персоналу</div>
      </div>
    </div>
    <div class="nav" id="tabs"></div>
    <div class="sidebar-footer">
      <div style="font-weight:900; margin-bottom:8px;">Данные обновлены</div>
      <div id="periodLabel">Загрузка...</div>
      <div style="margin-top:18px; opacity:.85;">Источник: Excel → JSON</div>
    </div>
  </aside>

  <main class="main">
    <section class="topbar">
      <div>
        <div class="page-title" id="pageTitle">Обзор</div>
        <div class="page-caption" id="pageCaption">Ключевые показатели HR-функции и динамика компании</div>
      </div>
      <div class="filters">
        <label class="chip">Период<select id="yearFilter"></select></label>
        <label class="chip">Сравнить с<select id="compareFilter"></select></label>
        <label class="chip">Департамент<select id="departmentFilter"><option>Все</option></select></label>
        <label class="chip">Тип занятости<select id="employmentFilter"><option>Штатные</option><option>Все</option><option>Аутсорсинг / неполная занятость</option></select></label>
        <button class="export-btn" onclick="alert('Экспорт добавим следующим этапом')">⬇ Экспорт</button>
      </div>
    </section>

    <section id="statusMessage" class="card">
      <div style="font-weight:900;">Загружаю данные...</div>
      <div class="muted" style="margin-top:6px; font-size:13px;">Проверяю файлы в папке /data.</div>
    </section>

    <section id="kpiGrid" class="kpi-grid"></section>
    <section id="content"></section>
  </main>
</div>

<script>
const tabs = [
  { id: 'Обзор', icon: '⌂', caption: 'Ключевые показатели HR-функции и динамика компании' },
  { id: 'Структура и менеджеры', icon: '♙', caption: 'Руководители, команды, нагрузка и управленческий риск' },
  { id: 'Текучесть и удержание', icon: '↻', caption: 'Динамика увольнений, текучесть и удержание' },
  { id: 'Состав команды', icon: '☷', caption: 'Демография, стаж и профиль сотрудников' },
  { id: 'География', icon: '◎', caption: 'Распределение сотрудников по странам и городам' },
  { id: 'Найм и увольнения', icon: '＋', caption: 'Входящий и исходящий поток сотрудников' },
  { id: 'Стаж и возраст', icon: '◴', caption: 'Стаж, возрастные группы и профиль стабильности команды' },
  { id: 'Отчёты', icon: '□', caption: 'Качество данных, экспорт и служебные отчёты' }
];

let activeTab = 'Обзор';
let charts = [];
let data = { monthly: [], departments: [], employees: [], events: [], locations: [], issues: [], summary: {} };
const monthNames = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];

const nonCoreAliases = ['contractor', 'outsourcer', 'consultant', 'part_time', 'contractor_or_part_time', 'аутсорсинг', 'неполная занятость'];

async function loadJson(path) {
  const response = await fetch(path, { cache: 'no-store' });
  if (!response.ok) throw new Error(`Не найден файл: ${path}`);
  return await response.json();
}
async function tryLoadJson(paths, fallback) {
  for (const path of paths) { try { return await loadJson(path); } catch(e) {} }
  return fallback;
}
async function loadData() {
  try {
    data.monthly = await loadJson('data/monthly_snapshots.json');
    data.departments = await loadJson('data/department_snapshots.json');
    data.employees = await loadJson('data/employees.json');
    data.events = await loadJson('data/employee_events.json');
    data.locations = await tryLoadJson(['data/location_snapshots.json', 'data/locations_snapshots.json'], []);
    data.issues = await tryLoadJson(['data/data_quality_issues.json'], []);
    data.summary = await tryLoadJson(['data/etl_summary.json'], {});
    document.getElementById('statusMessage').style.display = 'none';
    initializeFilters();
    render();
  } catch (error) {
    document.getElementById('statusMessage').innerHTML = `
      <div style="color:#b91c1c; font-weight:950;">Не удалось загрузить JSON-данные</div>
      <div style="margin-top:8px; color:#dc2626; font-size:13px;">${error.message}</div>
      <div class="muted" style="margin-top:14px; font-size:13px;">Проверь, что файлы лежат прямо в папке <b>data/</b>.</div>`;
  }
}

function num(v) { return Number(v || 0); }
function clean(v) { return (v === undefined || v === null || v === '❌') ? '' : String(v).trim(); }
function unique(arr) { return [...new Set(arr.filter(Boolean))]; }
function years() { return unique(data.monthly.map(x => Number(x.year)).filter(Boolean)).sort((a,b) => b-a); }
function selectedYear() { return Number(document.getElementById('yearFilter').value); }
function compareYear() { return Number(document.getElementById('compareFilter').value); }
function selectedDepartment() { return document.getElementById('departmentFilter').value; }
function selectedEmployment() { return document.getElementById('employmentFilter').value; }
function getDepartmentName(obj) { return clean(obj.department_name || obj.current_department_name || obj.department || obj.departmentName || obj['Департамент']); }
function getManagerName(obj) { return clean(obj.current_manager_name || obj.manager_name || obj.manager || obj['Вышестоящий руководитель']); }
function getEmployeeType(obj) { return clean(obj.employment_type || obj.employee_type || obj.employee_type_raw || obj.status_raw || obj['Тип сотрудника']); }
function getStatus(obj) { return clean(obj.status || obj.status_normalized || obj['Статус']).toLowerCase(); }
function getHireDate(obj) { return clean(obj.hire_date || obj['Первый рабочий день']); }
function getTerminationDate(obj) { return clean(obj.termination_date || obj['Последний рабочий день']); }
function getBirthDate(obj) { return clean(obj.birth_date || obj['День рождения']); }
function isRealEmployee(obj) { return obj.is_real_employee === true || obj.is_real_employee === 'true' || obj.is_real_employee === 'Да' || obj.is_real_employee === 1; }
function isExcluded(obj) { return obj.exclude_from_core_metrics === true || obj.exclude_from_core_metrics === 'true'; }
function isActiveOnEmployee(obj) { const s = getStatus(obj); return s === 'active' || s === 'on_leave' || s === 'работает' || s === 'в декрете'; }
function dateInYear(dateStr, year) { return clean(dateStr).slice(0,4) === String(year); }

function matchesEmployment(obj) {
  const filter = selectedEmployment();
  if (filter === 'Все') return !isExcluded(obj);
  const haystack = `${getEmployeeType(obj)} ${getStatus(obj)}`.toLowerCase();
  const isNonCore = nonCoreAliases.some(x => haystack.includes(x));
  if (filter === 'Аутсорсинг / неполная занятость') return !isExcluded(obj) && isNonCore;
  return !isExcluded(obj) && isRealEmployee(obj) && !isNonCore;
}
function employeePassesFilters(emp) {
  const dep = selectedDepartment();
  if (dep !== 'Все' && getDepartmentName(emp) !== dep) return false;
  return matchesEmployment(emp);
}
function activeEmployeesForYearEnd(year) {
  const end = `${year}-12-31`;
  return data.employees.filter(emp => {
    if (!employeePassesFilters(emp)) return false;
    const hire = getHireDate(emp);
    const term = getTerminationDate(emp);
    if (hire && hire > end) return false;
    if (term && term <= end) return false;
    return isActiveOnEmployee(emp) || !term;
  });
}
function employeesInYear(year) {
  return data.employees.filter(emp => employeePassesFilters(emp) && (dateInYear(getHireDate(emp), year) || dateInYear(getTerminationDate(emp), year) || activeEmployeesForYearEnd(year).includes(emp)));
}

function initializeFilters() {
  const ys = years();
  document.getElementById('yearFilter').innerHTML = ys.map(y => `<option>${y} (YTD)</option>`).join('');
  document.getElementById('compareFilter').innerHTML = ys.filter(y => y !== ys[0]).map(y => `<option>${y} (YTD)</option>`).join('') || ys.map(y => `<option>${y} (YTD)</option>`).join('');
  const depNames = unique([...data.departments.map(getDepartmentName), ...data.employees.map(getDepartmentName)]).sort();
  document.getElementById('departmentFilter').innerHTML = ['Все', ...depNames].map(d => `<option>${d}</option>`).join('');
  document.getElementById('periodLabel').textContent = `${Math.min(...ys)}–${Math.max(...ys)} · реальные JSON`;
}
function selectedYear() { return Number(String(document.getElementById('yearFilter').value).slice(0,4)); }
function compareYear() { return Number(String(document.getElementById('compareFilter').value).slice(0,4)); }
function disposeCharts() { charts.forEach(c => { try { c.dispose(); } catch(e) {} }); charts = []; }
function makeChart(id, option) { const el = document.getElementById(id); if (!el) return; const c = echarts.init(el); c.setOption(option); charts.push(c); }
function pct(current, previous) { if (!previous) return '0.0'; return (((current - previous) / previous) * 100).toFixed(1); }

function renderTabs() {
  document.getElementById('tabs').innerHTML = tabs.map(t => `<div class="tab ${t.id === activeTab ? 'active' : ''}" onclick="setTab('${t.id}')"><span>${t.icon}</span><span>${t.id}</span></div>`).join('');
}
function setTab(tab) { activeTab = tab; render(); }

function monthRows(year) {
  const dep = selectedDepartment();
  if (dep === 'Все') return data.monthly.filter(x => Number(x.year) === Number(year)).sort((a,b) => Number(a.month) - Number(b.month));
  return data.departments.filter(x => Number(x.year) === Number(year) && getDepartmentName(x) === dep).sort((a,b) => Number(a.month) - Number(b.month)).map(r => ({
    year: r.year, month: r.month,
    active_headcount_end: num(r.headcount_end || r.active_headcount_end),
    hires: num(r.hires), exits: num(r.exits),
    turnover_rate_pct: num(r.turnover_rate_pct), avg_tenure_days: num(r.avg_tenure_days)
  }));
}
function yearSummary(year) {
  const rows = monthRows(year);
  if (!rows.length) return { hc: 0, hires: 0, exits: 0, turnover: 0, tenure: 0, span: 0 };
  const last = rows[rows.length - 1];
  const hires = rows.reduce((s,x) => s + num(x.hires), 0);
  const exits = rows.reduce((s,x) => s + num(x.exits), 0);
  const turnoverRows = rows.filter(x => num(x.turnover_rate_pct) > 0);
  const avgTurnover = turnoverRows.length ? turnoverRows.reduce((s,x) => s + num(x.turnover_rate_pct), 0) / turnoverRows.length : 0;
  const managerList = managerRows(year);
  const span = managerList.length ? managerList.reduce((s,x)=>s+x.reports,0)/managerList.length : 0;
  return { hc: num(last.active_headcount_end || last.headcount_end), hires, exits, turnover: avgTurnover, tenure: num(last.avg_tenure_days) / 365, span };
}
function departmentRowsByYear(year, metric='headcount_end', limit=12) {
  const selected = selectedDepartment();
  return data.departments.filter(x => Number(x.year) === Number(year) && Number(x.month) === 12 && (selected === 'Все' || getDepartmentName(x) === selected))
    .map(d => ({ name: getDepartmentName(d), value: num(d[metric] || d.headcount_end || d.active_headcount_end), turnover: num(d.turnover_rate_pct), hires: num(d.hires), exits: num(d.exits) }))
    .filter(x => x.name && (x.value > 0 || x.turnover > 0 || x.hires > 0 || x.exits > 0))
    .sort((a,b) => b.value - a.value).slice(0, limit);
}
function managerRows(year) {
  const employees = activeEmployeesForYearEnd(year);
  const byManager = {};
  employees.forEach(emp => {
    const manager = getManagerName(emp);
    if (!manager) return;
    if (!byManager[manager]) byManager[manager] = { name: manager, reports: 0, departments: {}, exits: 0 };
    byManager[manager].reports += 1;
    const d = getDepartmentName(emp) || 'Не указан';
    byManager[manager].departments[d] = (byManager[manager].departments[d] || 0) + 1;
  });
  data.employees.filter(emp => employeePassesFilters(emp) && dateInYear(getTerminationDate(emp), year)).forEach(emp => {
    const manager = getManagerName(emp);
    if (manager && byManager[manager]) byManager[manager].exits += 1;
  });
  return Object.values(byManager).map(m => {
    const dept = Object.entries(m.departments).sort((a,b) => b[1]-a[1])[0]?.[0] || 'Не указан';
    const turnover = m.reports ? (m.exits / m.reports) * 100 : 0;
    const risk = m.reports >= 15 || turnover >= 8 ? 'Высокий' : (m.reports >= 10 || turnover >= 4 ? 'Средний' : 'Низкий');
    return { ...m, dept, turnover, risk };
  }).sort((a,b) => b.reports - a.reports);
}
function riskBadge(risk) {
  const colors = { 'Высокий': 'background:#FEF2F2;color:#B91C1C', 'Средний': 'background:#FFFBEB;color:#B45309', 'Низкий': 'background:#ECFDF5;color:#047857' };
  return `<span class="badge" style="${colors[risk] || colors['Средний']}">${risk}</span>`;
}
function activeAgeBands(year) {
  const end = new Date(`${year}-12-31T00:00:00`);
  const bands = { '< 25 лет': 0, '25–34 года': 0, '35–44 года': 0, '45–54 года': 0, '55+ лет': 0, 'Не указано': 0 };
  activeEmployeesForYearEnd(year).forEach(emp => {
    const bd = new Date(getBirthDate(emp));
    if (isNaN(bd)) { bands['Не указано']++; return; }
    const age = Math.floor((end - bd) / (365.25*24*60*60*1000));
    if (age < 25) bands['< 25 лет']++;
    else if (age < 35) bands['25–34 года']++;
    else if (age < 45) bands['35–44 года']++;
    else if (age < 55) bands['45–54 года']++;
    else bands['55+ лет']++;
  });
  return Object.entries(bands).map(([name,value]) => ({name,value})).filter(x => x.value > 0);
}
function tenureBands(year) {
  const end = new Date(`${year}-12-31T00:00:00`);
  const bands = { '<3 мес': 0, '3–6 мес': 0, '6–12 мес': 0, '1–2 года': 0, '2–5 лет': 0, '5+ лет': 0 };
  activeEmployeesForYearEnd(year).forEach(emp => {
    const hire = new Date(getHireDate(emp));
    if (isNaN(hire)) return;
    const days = (end - hire) / (1000*60*60*24);
    if (days < 90) bands['<3 мес']++;
    else if (days < 180) bands['3–6 мес']++;
    else if (days < 365) bands['6–12 мес']++;
    else if (days < 730) bands['1–2 года']++;
    else if (days < 1825) bands['2–5 лет']++;
    else bands['5+ лет']++;
  });
  return Object.entries(bands).map(([name,value]) => ({ name, value }));
}
function cityRows() {
  const latest = Math.max(...data.locations.map(x => Number(x.year) * 100 + Number(x.month)).filter(Boolean));
  let rows = data.locations.filter(x => Number(x.year) * 100 + Number(x.month) === latest);
  const dep = selectedDepartment();
  if (dep !== 'Все') rows = rows.filter(x => getDepartmentName(x) === dep || !getDepartmentName(x));
  const agg = {};
  rows.forEach(x => { const k = clean(x.city || x.country || 'Не указано'); agg[k] = (agg[k] || 0) + num(x.headcount_end || x.active_headcount_end); });
  if (!Object.keys(agg).length) activeEmployeesForYearEnd(selectedYear()).forEach(emp => { const k = clean(emp.city || emp.country || 'Не указано'); agg[k] = (agg[k] || 0) + 1; });
  return Object.entries(agg).map(([name,value]) => ({ name, value })).filter(x => x.value > 0).sort((a,b) => b.value - a.value);
}
function countryRows(year) {
  const agg = {};
  activeEmployeesForYearEnd(year).forEach(emp => { const k = clean(emp.country || 'Не указано'); agg[k] = (agg[k] || 0) + 1; });
  return Object.entries(agg).map(([name,value]) => ({name,value})).sort((a,b)=>b.value-a.value).slice(0,8);
}
function yoyRows(year, compare) {
  const a = yearSummary(year), b = yearSummary(compare);
  return [
    ['Численность', a.hc, b.hc, `${pct(a.hc, b.hc)}%`],
    ['Найм', a.hires, b.hires, `${pct(a.hires, b.hires)}%`],

    ['Средний стаж (лет)', a.tenure.toFixed(1), b.tenure.toFixed(1), `${(a.tenure-b.tenure).toFixed(1)}`],
    ['Охват руководителя', a.span.toFixed(1), b.span.toFixed(1), `${(a.span-b.span).toFixed(1)}`]
  ];
}

    makeChart('flowChart2', { color:['#22c55e','#f43f5e'], tooltip:{trigger:'axis'}, legend:{bottom:0}, grid:{top:25,left:45,right:20,bottom:45}, xAxis:{type:'category',data:monthNames}, yAxis:{type:'value'}, series:[{name:'Найм',type:'bar',data:mrY.map(x=>num(x.hires))},{name:'Увольнения',type:'bar',data:mrY.map(x=>num(x.exits))}] });
  }

  if (activeTab === 'Стаж и возраст') {
    const tb = tenureBands(y);
    makeChart('tenureChart2', { color:['#22c55e'], tooltip:{trigger:'axis'}, grid:{left:45,right:20,top:25,bottom:45}, xAxis:{type:'category',data:tb.map(x=>x.name)}, yAxis:{type:'value'}, series:[{name:'Сотрудники',type:'bar',data:tb.map(x=>x.value),itemStyle:{borderRadius:[8,8,0,0]}}] });
    makeChart('ageChart3', { color:['#7c3aed','#3b82f6','#22c55e','#f59e0b','#f43f5e','#94a3b8'], tooltip:{trigger:'item'}, legend:{bottom:0}, series:[{type:'pie',radius:['45%','70%'],data:activeAgeBands(y)}] });
  }
}

document.getElementById('yearFilter').addEventListener('change', render);
document.getElementById('compareFilter').addEventListener('change', render);
document.getElementById('departmentFilter').addEventListener('change', render);
document.getElementById('employmentFilter').addEventListener('change', render);
window.addEventListener('resize', () => charts.forEach(c => c.resize()));
loadData();
</script>
